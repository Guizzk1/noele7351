name: Prepare and Build ZenKernel

on:
  workflow_call:
    inputs:
      config_file:
        description: "Path to the JSON config file"
        required: true
        type: string
      feature_set:
        description: "Feature Set"
        required: true
        type: string
      susfs_commit:
        description: "SUSFS commit hash (empty = latest branch HEAD)"
        required: false
        type: string
        default: ""
    outputs:
      kernel_real:
        value: ${{ jobs.build.outputs.kernel_real }}
      kernel_release:
        value: ${{ jobs.build.outputs.kernel_release }}
      ksu_version:
        value: ${{ jobs.build.outputs.ksu_version }}
      ksu_tag:
        value: ${{ jobs.build.outputs.ksu_tag }}
      ksu_commit:
        value: ${{ jobs.build.outputs.ksu_commit }}
      susfs_version:
        value: ${{ jobs.build.outputs.susfs_version }}
      android_common_commit:
        value: ${{ jobs.build.outputs.android_common_commit }}
      anykernel_commit:
        value: ${{ jobs.build.outputs.anykernel_commit }}
      zip_name:
        value: ${{ jobs.build.outputs.zip_name }}
      zip_sha256:
        value: ${{ jobs.build.outputs.zip_sha256 }}
      artifact_name:
        value: ${{ jobs.build.outputs.artifact_name }}
      rej_count:
        value: ${{ jobs.build.outputs.rej_count }}

jobs:
  generate-matrix:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.matrix.outputs.matrix }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Read build configuration
        id: matrix
        shell: bash
        run: |
          set -euo pipefail
          config_file="${{ inputs.config_file }}"
          [ -f "$config_file" ] || {
            echo "ERROR: config file not found: $config_file" >&2
            exit 1
          }

          matrix="$(jq -c '
            (.version | split("-")) as $parts
            | {
                include: [
                  .include[]
                  | {
                      version: $parts | join("-"),
                      android_version: $parts[0],
                      kernel_version: $parts[1],
                      os_patch_level: .date,
                      variant: "Normal"
                    }
                ]
              }
          ' "$config_file")"

          echo "matrix=$matrix" >> "$GITHUB_OUTPUT"

  build:
    needs: generate-matrix
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.generate-matrix.outputs.matrix) }}
    uses: ./.github/workflows/build.yml
    with:
      version: ${{ matrix.version }}
      android_version: ${{ matrix.android_version }}
      kernel_version: ${{ matrix.kernel_version }}
      os_patch_level: ${{ matrix.os_patch_level }}
      variant: Normal
      feature_set: KSUN+SUSFS
      susfs_commit: ${{ inputs.susfs_commit }}
    secrets: inherit
