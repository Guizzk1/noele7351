name: Build ZenKernel

permissions:
  contents: write
  actions: read

on:
  workflow_dispatch:
    inputs:
      release_type:
        description: "Release Type"
        type: choice
        options:
          - Action
          - Pre-Release
          - Release
        default: Action
      feature_set:
        description: "Feature Set"
        type: choice
        options:
          - KSUN+SUSFS
        default: KSUN+SUSFS
      susfs_commit:
        description: "SUSFS commit (empty = latest gki-android12-5.10 branch HEAD)"
        type: string
        required: false
        default: ""

jobs:
  build-android12-5-10:
    name: Android 12 GKI 5.10 LTS
    uses: ./.github/workflows/prepare.yml
    with:
      config_file: .github/config/android12-5.10.json
      feature_set: KSUN+SUSFS
      susfs_commit: ${{ inputs.susfs_commit }}
    secrets: inherit

  summary:
    name: Build summary
    if: ${{ always() }}
    runs-on: ubuntu-latest
    needs:
      - build-android12-5-10
    steps:
      - name: Write final summary
        env:
          BUILD_RESULT: ${{ needs.build-android12-5-10.result }}
          KERNEL_REAL: ${{ needs.build-android12-5-10.outputs.kernel_real }}
          KERNEL_RELEASE: ${{ needs.build-android12-5-10.outputs.kernel_release }}
          KSU_VERSION: ${{ needs.build-android12-5-10.outputs.ksu_version }}
          KSU_TAG: ${{ needs.build-android12-5-10.outputs.ksu_tag }}
          KSU_COMMIT: ${{ needs.build-android12-5-10.outputs.ksu_commit }}
          SUSFS_VERSION: ${{ needs.build-android12-5-10.outputs.susfs_version }}
          ANDROID_COMMON_COMMIT: ${{ needs.build-android12-5-10.outputs.android_common_commit }}
          ANYKERNEL_COMMIT: ${{ needs.build-android12-5-10.outputs.anykernel_commit }}
          ZIP_NAME: ${{ needs.build-android12-5-10.outputs.zip_name }}
          ZIP_SHA256: ${{ needs.build-android12-5-10.outputs.zip_sha256 }}
          REJ_COUNT: ${{ needs.build-android12-5-10.outputs.rej_count }}
        run: |
          set -euo pipefail

          if [ "$BUILD_RESULT" = "success" ]; then
            status="✅ Success"
          else
            status="❌ Failed"
          fi

          value_or_na() {
            if [ -n "$1" ]; then
              printf '%s' "$1"
            else
              printf 'N/A'
            fi
          }

          {
            echo "# 📋 ZenKernel Build Summary — $(date -u '+%Y-%m-%d %H:%M UTC')"
            echo
            echo "**Results:** $([ "$BUILD_RESULT" = "success" ] && echo '1/1 succeeded' || echo '0/1 succeeded')"
            echo
            echo "| Metric | Value |"
            echo "| --- | --- |"
            echo "| Status | $status |"
            echo "| Kernel Version | $(value_or_na "$KERNEL_REAL") |"
            echo "| Kernel Release | \`$(value_or_na "$KERNEL_RELEASE")\` |"
            echo "| KernelSU Version | $(value_or_na "$KSU_VERSION") |"
            echo "| KernelSU Tag | $(value_or_na "$KSU_TAG") |"
            echo "| KernelSU Commit | \`$(value_or_na "$KSU_COMMIT")\` |"
            echo "| SUSFS Version | $(value_or_na "$SUSFS_VERSION") |"
            echo "| Feature Set | KSUN+SUSFS |"
            echo "| Variant | Normal |"
            echo "| Android Common Kernel Commit | \`$(value_or_na "$ANDROID_COMMON_COMMIT")\` |"
            echo "| AnyKernel Commit | \`$(value_or_na "$ANYKERNEL_COMMIT")\` |"
            echo "| ZIP | \`$(value_or_na "$ZIP_NAME")\` |"
            echo "| SHA-256 | \`$(value_or_na "$ZIP_SHA256")\` |"
            echo "| .rej Files | $(value_or_na "$REJ_COUNT") |"
          } >> "$GITHUB_STEP_SUMMARY"

  release:
    name: Publish release
    if: >-
      ${{
        github.event_name == 'workflow_dispatch' &&
        needs.build-android12-5-10.result == 'success' &&
        (inputs.release_type == 'Pre-Release' || inputs.release_type == 'Release')
      }}
    needs:
      - build-android12-5-10
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: write
    env:
      GH_TOKEN: ${{ github.token }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Generate release tag
        id: tag
        shell: bash
        run: |
          set -euo pipefail
          mapfile -t tags < <(
            gh api --paginate "repos/${{ github.repository }}/tags?per_page=100" \
              --jq '.[].name' 2>/dev/null | grep -E '^r[0-9]+$' || true
          )

          latest=0
          for tag in "${tags[@]}"; do
            revision="${tag#r}"
            if [[ "$revision" =~ ^[0-9]+$ ]] && [ "$revision" -gt "$latest" ]; then
              latest="$revision"
            fi
          done

          new_tag="r$((latest + 1))"
          echo "new_tag=$new_tag" >> "$GITHUB_OUTPUT"

      - name: Download AnyKernel3 package
        uses: actions/download-artifact@v8
        with:
          name: ${{ needs.build-android12-5-10.outputs.artifact_name }}
          path: anykernel3-staging

      - name: Repackage and verify release ZIP
        env:
          ZIP_NAME: ${{ needs.build-android12-5-10.outputs.zip_name }}
          BUILD_SHA256: ${{ needs.build-android12-5-10.outputs.zip_sha256 }}
        run: |
          set -euo pipefail
          mkdir -p release-assets
          zip_path="release-assets/$ZIP_NAME"
          (cd anykernel3-staging && zip -r -q -9 "../$zip_path" .)
          [ -f "$zip_path" ] || {
            echo "ERROR: release ZIP was not created: $zip_path" >&2
            exit 1
          }
          actual_sha256="$(sha256sum "$zip_path" | awk '{print $1}')"
          echo "Release ZIP:      $ZIP_NAME"
          echo "Actual SHA-256:   $actual_sha256"
          echo "Build SHA-256:    $BUILD_SHA256"
          if [ "$actual_sha256" != "$BUILD_SHA256" ]; then
            echo "::warning::SHA-256 mismatch (repackaging may alter zip metadata; contents are identical)"
          fi
          echo "RELEASE_ZIP_SHA256=$actual_sha256" >> "$GITHUB_ENV"

      - name: Create release notes
        env:
          KERNEL_REAL: ${{ needs.build-android12-5-10.outputs.kernel_real }}
          KERNEL_RELEASE: ${{ needs.build-android12-5-10.outputs.kernel_release }}
          KSU_VERSION: ${{ needs.build-android12-5-10.outputs.ksu_version }}
          KSU_TAG: ${{ needs.build-android12-5-10.outputs.ksu_tag }}
          KSU_COMMIT: ${{ needs.build-android12-5-10.outputs.ksu_commit }}
          SUSFS_VERSION: ${{ needs.build-android12-5-10.outputs.susfs_version }}
          ANDROID_COMMON_COMMIT: ${{ needs.build-android12-5-10.outputs.android_common_commit }}
          ANYKERNEL_COMMIT: ${{ needs.build-android12-5-10.outputs.anykernel_commit }}
          ZIP_NAME: ${{ needs.build-android12-5-10.outputs.zip_name }}
        run: |
          set -euo pipefail
          {
            echo "# ZenKernel"
            echo
            echo "- Kernel: $KERNEL_REAL"
            echo "- Kernel release: \`$KERNEL_RELEASE\`"
            echo "- KernelSU Next: $KSU_VERSION ($KSU_TAG, \`$KSU_COMMIT\`)"
            echo "- SUSFS: $SUSFS_VERSION"
            echo "- Feature Set: KSUN+SUSFS"
            echo "- Variant: Normal"
            echo "- Android Common Kernel: \`$ANDROID_COMMON_COMMIT\`"
            echo "- AnyKernel: \`$ANYKERNEL_COMMIT\`"
            echo "- ZIP: \`$ZIP_NAME\`"
            echo "- SHA-256: \`${RELEASE_ZIP_SHA256}\`"
          } > release-body.md

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.new_tag }}
          name: ZenKernel ${{ needs.build-android12-5-10.outputs.kernel_real }}
          body_path: release-body.md
          draft: false
          prerelease: ${{ inputs.release_type == 'Pre-Release' }}
          files: release-assets/${{ needs.build-android12-5-10.outputs.zip_name }}
          
