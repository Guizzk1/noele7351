name: Fail on Patch Rejects
description: Count every .rej file and fail the build when any reject exists

outputs:
  rej_count:
    description: Number of .rej files found
    value: ${{ steps.scan.outputs.rej_count }}

runs:
  using: composite
  steps:
    - name: Scan workspace for .rej files
      id: scan
      shell: bash
      run: |
        set -euo pipefail

        mapfile -d '' rejects < <(
          find "${{ github.workspace }}" \
            -path '*/.git' -prune -o \
            -type f -name '*.rej' -print0
        )

        rej_count="${#rejects[@]}"
        echo "REJ_COUNT=$rej_count" >> "$GITHUB_ENV"
        echo "rej_count=$rej_count" >> "$GITHUB_OUTPUT"

        if [ "$rej_count" -gt 0 ]; then
          echo "ERROR: $rej_count patch reject file(s) found:" >&2
          printf ' - %s\n' "${rejects[@]}" >&2
          exit 1
        fi

        echo "Patch reject files: 0"
