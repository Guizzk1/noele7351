name: Read Real Kernel Version
description: Read VERSION, PATCHLEVEL, and SUBLEVEL from kernel/common/Makefile

outputs:
  version:
    description: Kernel VERSION value
    value: ${{ steps.version.outputs.version }}
  patchlevel:
    description: Kernel PATCHLEVEL value
    value: ${{ steps.version.outputs.patchlevel }}
  sublevel:
    description: Kernel SUBLEVEL value
    value: ${{ steps.version.outputs.sublevel }}
  kernel_real:
    description: Real kernel version in VERSION.PATCHLEVEL.SUBLEVEL form
    value: ${{ steps.version.outputs.kernel_real }}

runs:
  using: composite
  steps:
    - name: Read kernel/common/Makefile
      id: version
      shell: bash
      run: |
        set -euo pipefail

        makefile="${{ github.workspace }}/kernel/common/Makefile"
        [ -f "$makefile" ] || {
          echo "ERROR: kernel Makefile not found: $makefile" >&2
          exit 1
        }

        read_make_value() {
          local key="$1"
          awk -F= -v key="$key" '
            $1 ~ "^[[:space:]]*" key "[[:space:]]*$" {
              value = $2
              gsub(/^[[:space:]]+|[[:space:]]+$/, "", value)
              print value
              exit
            }
          ' "$makefile"
        }

        kernel_version="$(read_make_value VERSION)"
        patchlevel="$(read_make_value PATCHLEVEL)"
        sublevel="$(read_make_value SUBLEVEL)"

        for value in "$kernel_version" "$patchlevel" "$sublevel"; do
          if ! [[ "$value" =~ ^[0-9]+$ ]]; then
            echo "ERROR: invalid kernel version component in $makefile: '$value'" >&2
            exit 1
          fi
        done

        kernel_real="${kernel_version}.${patchlevel}.${sublevel}"

        echo "KERNEL_VERSION=$kernel_version" >> "$GITHUB_ENV"
        echo "KERNEL_PATCHLEVEL=$patchlevel" >> "$GITHUB_ENV"
        echo "KERNEL_SUBLEVEL=$sublevel" >> "$GITHUB_ENV"
        echo "KERNEL_REAL=$kernel_real" >> "$GITHUB_ENV"

        echo "version=$kernel_version" >> "$GITHUB_OUTPUT"
        echo "patchlevel=$patchlevel" >> "$GITHUB_OUTPUT"
        echo "sublevel=$sublevel" >> "$GITHUB_OUTPUT"
        echo "kernel_real=$kernel_real" >> "$GITHUB_OUTPUT"

        echo "Real kernel version: $kernel_real"
