name: 'Download Kernel Repository'
description: 'Initialize and sync Android kernel source repository'

inputs:
  android_version:
    description: 'Android version (e.g., android14)'
    required: true
  kernel_version:
    description: 'Kernel version (e.g., 5.15, 6.1)'
    required: true
  version:
    description: 'Combined version (e.g., android14-6.1)'
    required: true
  os_patch_level:
    description: 'OS patch level (e.g., 2024-01)'
    required: true

outputs:
  deprecated_branch:
    description: 'Whether the branch is deprecated'
    value: ${{ steps.sync.outputs.deprecated }}
  common_commit:
    description: 'Android Common Kernel commit SHA'
    value: ${{ steps.metadata.outputs.common_commit }}

runs:
  using: composite
  steps:
    - name: Initialize and Sync Kernel Repository
      id: sync
      shell: bash
      working-directory: ${{ github.workspace }}/kernel
      run: |
        set -euo pipefail

        VERSION="${{ inputs.version }}"
        ANDROID_PART="${VERSION%%-*}"
        KERNEL_PART="${VERSION#*-}"
        FORMATTED_BRANCH="${ANDROID_PART}-${KERNEL_PART}-${{ inputs.os_patch_level }}"

        COMMON_REPO_URL="https://android.googlesource.com/kernel/common"
        COMMON_REF="refs/heads/${FORMATTED_BRANCH}"
        MANIFEST_BRANCH="common-${FORMATTED_BRANCH}"
        DEPRECATED=false
        EXPECTED_COMMON_SHA=""

        resolve_branch() {
          EXPECTED_COMMON_SHA="$(git ls-remote "$COMMON_REPO_URL" "$COMMON_REF" | awk 'NR == 1 {print $1}')"

          if [[ -n "$EXPECTED_COMMON_SHA" ]]; then
            return 0
          fi

          COMMON_REF="refs/heads/deprecated/${FORMATTED_BRANCH}"
          MANIFEST_BRANCH="deprecated/common-${FORMATTED_BRANCH}"
          EXPECTED_COMMON_SHA="$(git ls-remote "$COMMON_REPO_URL" "$COMMON_REF" | awk 'NR == 1 {print $1}')"

          if [[ -z "$EXPECTED_COMMON_SHA" ]]; then
            echo "ERROR: kernel/common branch not found: ${FORMATTED_BRANCH}" >&2
            echo "ERROR: checked both normal and deprecated refs." >&2
            return 1
          fi

          DEPRECATED=true
          echo "⚠ Note: Branch ${FORMATTED_BRANCH} is considered deprecated."
        }

        init_repo() {
          repo init \
            -u https://android.googlesource.com/kernel/manifest \
            -b "$MANIFEST_BRANCH" \
            --no-use-superproject \
            --depth=1 || {
              echo "ERROR: repo init failed for ${MANIFEST_BRANCH}" >&2
              return 1
            }
        }

        validate_or_repair_common() {
          local actual_sha=""

          if [[ -d common/.git || -f common/.git ]]; then
            actual_sha="$(git -C common rev-parse HEAD 2>/dev/null || true)"
          fi

          if [[ "$actual_sha" != "$EXPECTED_COMMON_SHA" ]] || \
             [[ ! -f common/Makefile ]] || \
             [[ ! -d common/drivers ]] || \
             [[ ! -d common/tools ]]; then
            echo "::warning::kernel/common was synced at an invalid or incomplete revision. Repairing checkout."
            echo "Expected common commit: $EXPECTED_COMMON_SHA"
            echo "Current common commit:  ${actual_sha:-missing}"

            if [[ ! -d common/.git && ! -f common/.git ]]; then
              echo "ERROR: kernel/common is not a Git checkout after repo sync." >&2
              return 1
            fi

            git -C common fetch \
              --force \
              --no-tags \
              --depth=1 \
              "$COMMON_REPO_URL" \
              "$COMMON_REF"
            EXPECTED_COMMON_SHA="$(git -C common rev-parse FETCH_HEAD)"
            git -C common checkout --force --detach FETCH_HEAD
            git -C common reset --hard FETCH_HEAD
            git -C common clean -fdx
          fi

          actual_sha="$(git -C common rev-parse HEAD 2>/dev/null || true)"
          if [[ "$actual_sha" != "$EXPECTED_COMMON_SHA" ]]; then
            echo "ERROR: kernel/common is still at the wrong commit after repair." >&2
            echo "Expected: $EXPECTED_COMMON_SHA" >&2
            echo "Actual:   ${actual_sha:-missing}" >&2
            return 1
          fi

          local required_paths=(
            "Makefile"
            "drivers"
            "fs"
            "include"
            "tools"
            "tools/bpf/resolve_btfids/Makefile"
          )
          local required_path
          for required_path in "${required_paths[@]}"; do
            if [[ ! -e "common/$required_path" ]]; then
              echo "ERROR: required kernel path is missing: common/$required_path" >&2
              return 1
            fi
          done

          echo "kernel/common checkout validated: $actual_sha"
        }

        resolve_branch || exit 1
        echo "deprecated=$DEPRECATED" >> "$GITHUB_OUTPUT"
        echo "Manifest branch: $MANIFEST_BRANCH"
        echo "Kernel common ref: $COMMON_REF"
        echo "Expected common commit: $EXPECTED_COMMON_SHA"

        init_repo || exit 1

        MAX_RETRIES=3
        RETRY_DELAY_SHORT=15
        SYNC_TIMEOUT="15m"
        attempt=1

        while [[ $attempt -le $MAX_RETRIES ]]; do
          echo "Attempt $attempt/$MAX_RETRIES: repo sync (timeout $SYNC_TIMEOUT)..."

          if timeout "$SYNC_TIMEOUT" repo sync \
            -c \
            --current-branch \
            --no-clone-bundle \
            --no-tags \
            --jobs-checkout=4 \
            -j4; then
            echo "repo sync succeeded on attempt $attempt."
            break
          else
            rc=$?
          fi

          if [[ $rc -eq 124 ]]; then
            echo "repo sync timed out after $SYNC_TIMEOUT."
          else
            echo "repo sync failed with exit code $rc."
          fi

          if [[ $attempt -ge $MAX_RETRIES ]]; then
            echo "All $MAX_RETRIES attempts failed." >&2
            exit "$rc"
          fi

          echo "Cleaning repo metadata and retrying after ${RETRY_DELAY_SHORT}s..."
          rm -rf .repo
          sleep "$RETRY_DELAY_SHORT"
          init_repo || exit 1
          attempt=$((attempt + 1))
        done

        validate_or_repair_common

    # --- Non-repo steps (commented out; we only use repo now) ---
