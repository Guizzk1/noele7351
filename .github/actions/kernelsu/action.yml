name: Setup Latest KernelSU Next
description: Clone and configure the latest pershoot/KernelSU-Next dev-susfs HEAD

runs:
  using: composite
  steps:
    - name: Clone latest dev-susfs checkout
      shell: bash
      working-directory: ${{ github.workspace }}/kernel/common
      run: |
        set -euo pipefail

        ksu_repo="https://github.com/pershoot/KernelSU-Next.git"
        ksu_branch="dev-susfs"
        checkout_dir="KernelSU-Next"

        remote_sha="$(git ls-remote "$ksu_repo" "refs/heads/$ksu_branch" | awk 'NR == 1 {print $1}')"
        [ -n "$remote_sha" ] || {
          echo "ERROR: unable to resolve $ksu_repo branch $ksu_branch" >&2
          exit 1
        }

        # A cached or previous checkout must never pin KernelSU Next.
        rm -rf "$checkout_dir"
        rm -f drivers/kernelsu

        git clone \
          --branch "$ksu_branch" \
          --single-branch \
          "$ksu_repo" \
          "$checkout_dir"

        git -C "$checkout_dir" fetch --force --prune --tags origin \
          "+refs/heads/$ksu_branch:refs/remotes/origin/$ksu_branch"
        git -C "$checkout_dir" remote set-head origin "$ksu_branch"
        git -C "$checkout_dir" checkout --force --detach "origin/$ksu_branch"

        actual_sha="$(git -C "$checkout_dir" rev-parse HEAD)"
        if [ "$actual_sha" != "$remote_sha" ]; then
          echo "ERROR: KernelSU Next checkout is not the latest remote HEAD." >&2
          echo "Remote: $remote_sha" >&2
          echo "Local:  $actual_sha" >&2
          exit 1
        fi

        commits_count="$(git -C "$checkout_dir" rev-list --count HEAD)"
        ksu_version="$((30000 + commits_count))"
        ksu_tag="$(git -C "$checkout_dir" describe --tags --abbrev=0 HEAD 2>/dev/null || echo no-tag)"

        ln -s "../KernelSU-Next/kernel" drivers/kernelsu
        grep -q 'obj-$(CONFIG_KSU) += kernelsu/' drivers/Makefile || \
          printf '\nobj-$(CONFIG_KSU) += kernelsu/\n' >> drivers/Makefile
        grep -q 'source "drivers/kernelsu/Kconfig"' drivers/Kconfig || \
          sed -i '/endmenu/i\source "drivers/kernelsu/Kconfig"' drivers/Kconfig

        echo "KSUN_BRANCH=$ksu_branch" >> "$GITHUB_ENV"
        echo "KSUN_COMMIT=$actual_sha" >> "$GITHUB_ENV"
        echo "KSU_VERSION=$ksu_version" >> "$GITHUB_ENV"
        echo "KSU_GIT_TAG=$ksu_tag" >> "$GITHUB_ENV"

        echo "KernelSU Next repository: $ksu_repo"
        echo "KernelSU Next branch:     $ksu_branch"
        echo "KernelSU Next commit:     $actual_sha"
        echo "KernelSU Next version:    $ksu_version"
        echo "KernelSU Next tag:        $ksu_tag"

    - name: Apply KernelSU Next compatibility fix
      shell: bash
      working-directory: ${{ github.workspace }}/kernel/common/KernelSU-Next
      run: |
        set -euo pipefail
        patch_file="${{ github.action_path }}/patches/static.patch"
        patch --batch --forward -p1 < "$patch_file"

    - name: Enable KernelSU Next
      uses: ./.github/actions/set-kernel-config
      with:
        config_list: |
          CONFIG_KSU=y
