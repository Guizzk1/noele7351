name: Setup KernelSU-Next Latest
description: Download and configure the latest KernelSU-Next dev-susfs branch with accurate version tracking

inputs:
  ksu_branch:
    description: 'Kept for workflow compatibility. The latest dev-susfs branch is always used.'
    required: false
    default: ""

runs:
  using: composite
  steps:
    - name: Download latest KernelSU-Next
      shell: bash
      working-directory: ${{ github.workspace }}/kernel/common
      run: |
        set -euo pipefail

        KSU_REPO="https://github.com/pershoot/KernelSU-Next.git"
        KSU_BRANCH="dev-susfs"
        REQUESTED_REF="${{ inputs.ksu_branch }}"

        if [[ -n "$REQUESTED_REF" && "$REQUESTED_REF" != "$KSU_BRANCH" ]]; then
          echo "::warning::Ignoring requested KernelSU ref '$REQUESTED_REF'. This workflow always compiles the latest '$KSU_BRANCH' revision."
        fi

        REMOTE_SHA="$(git ls-remote "$KSU_REPO" "refs/heads/$KSU_BRANCH" | awk 'NR == 1 {print $1}')"
        if [[ -z "$REMOTE_SHA" ]]; then
          echo "ERROR: Could not resolve the latest KernelSU-Next $KSU_BRANCH commit." >&2
          exit 1
        fi

        # Start clean so a previous or cached checkout can never pin an old revision.
        rm -rf KernelSU-Next

        curl --fail --location --silent --show-error \
          "https://raw.githubusercontent.com/pershoot/KernelSU-Next/${KSU_BRANCH}/kernel/setup.sh" \
          | bash -s "$KSU_BRANCH"

        # Fetch the complete current branch. Full history is required because
        # KernelSU-Next derives its numeric version from the commit count.
        if [[ -f KernelSU-Next/.git/shallow ]]; then
          git -C KernelSU-Next fetch --force --prune --tags --unshallow origin
        else
          git -C KernelSU-Next fetch --force --prune --tags origin
        fi

        git -C KernelSU-Next fetch --force origin \
          "+refs/heads/${KSU_BRANCH}:refs/remotes/origin/${KSU_BRANCH}"

        # Kbuild checks origin/HEAD while the source is on a detached HEAD.
        # Point it to dev-susfs so the compiled version uses this exact branch.
        git -C KernelSU-Next remote set-head origin "$KSU_BRANCH"
        git -C KernelSU-Next checkout --force --detach "origin/$KSU_BRANCH"

        ACTUAL_SHA="$(git -C KernelSU-Next rev-parse HEAD)"
        if [[ "$ACTUAL_SHA" != "$REMOTE_SHA" ]]; then
          echo "ERROR: KernelSU-Next checkout is not at the latest remote commit." >&2
          echo "Expected: $REMOTE_SHA" >&2
          echo "Actual:   $ACTUAL_SHA" >&2
          exit 1
        fi

        COMMITS_COUNT="$(git -C KernelSU-Next rev-list --count HEAD)"
        KSU_VERSION="$((30000 + COMMITS_COUNT))"
        KSU_GIT_TAG="$(git -C KernelSU-Next describe --tags --abbrev=0 HEAD 2>/dev/null || echo 'no-tag')"
        KSU_COMMIT="$(git -C KernelSU-Next rev-parse --short=12 HEAD)"

        # These values are fallbacks only. With the Git checkout present,
        # KernelSU-Next Kbuild calculates the same version from HEAD.
        sed -i -E \
          "s/^KSU_VERSION_FALLBACK := .*/KSU_VERSION_FALLBACK := ${KSU_VERSION}/" \
          KernelSU-Next/kernel/Kbuild
        sed -i -E \
          "s/^KSU_VERSION_TAG_FALLBACK := .*/KSU_VERSION_TAG_FALLBACK := ${KSU_GIT_TAG}/" \
          KernelSU-Next/kernel/Kbuild

        echo "KSUN_BRANCH=$KSU_BRANCH" >> "$GITHUB_ENV"
        echo "KSUN_COMMIT=$ACTUAL_SHA" >> "$GITHUB_ENV"
        echo "KSU_COMMIT=$KSU_COMMIT" >> "$GITHUB_ENV"
        echo "KSU_COMMITS_COUNT=$COMMITS_COUNT" >> "$GITHUB_ENV"
        echo "KSU_VERSION=$KSU_VERSION" >> "$GITHUB_ENV"
        echo "KSU_GIT_TAG=$KSU_GIT_TAG" >> "$GITHUB_ENV"

        echo "KernelSU-Next branch:  $KSU_BRANCH"
        echo "KernelSU-Next commit:  $ACTUAL_SHA"
        echo "KernelSU-Next version: $KSU_VERSION"
        echo "KernelSU-Next tag:     $KSU_GIT_TAG"

    - name: Fix KernelSU-Next
      shell: bash
      working-directory: ${{ github.workspace }}/kernel/common/KernelSU-Next
      run: |
        set -euo pipefail
        cp "${{ github.action_path }}/patches/static.patch" static.patch
        patch -p1 < static.patch

    - name: Enable KernelSU config
      uses: ./.github/actions/set-kernel-config
      with:
        config_list: |
          CONFIG_KSU=y
          
