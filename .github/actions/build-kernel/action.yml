name: Build Normal Kernel Image
description: Build one normal GKI Image without module-version bypasses

inputs:
  version:
    description: Kernel config version
    required: true

runs:
  using: composite
  steps:
    - name: Build kernel
      shell: bash
      working-directory: ${{ github.workspace }}/kernel
      run: |
        set -euo pipefail

        cat common/arch/arm64/configs/gki_defconfig
        sed -i 's/check_defconfig//' common/build.config.gki

        cc=clang
        cxx=clang++
        hostcc=clang
        hostcxx=clang++
        if command -v ccache >/dev/null 2>&1 && ccache --version >/dev/null 2>&1; then
          cc="$(command -v ccache) clang"
          cxx="$(command -v ccache) clang++"
          hostcc="$cc"
          hostcxx="$cxx"
          echo "Compiler cache enabled."
        else
          echo "Compiler cache unavailable; continuing without cache."
        fi

        ld=ld.lld
        hostld=ld.lld
        if [ -x "${{ github.workspace }}/kernel/common/ld-wrapper" ]; then
          ld="${{ github.workspace }}/kernel/common/ld-wrapper"
          hostld="$ld"
          echo "ThinLTO cache wrapper enabled."
        else
          echo "ThinLTO cache wrapper unavailable; continuing without cache."
        fi

        if [ -f build/build.sh ]; then
          BUILD_GKI_ARTIFACTS= \
          BUILD_GKI_CERTIFICATION_TOOLS=0 \
          BUILD_SYSTEM_DLKM=0 \
          SKIP_VENDOR_BOOT=1 \
          SKIP_EXT_MODULES=1 \
          SKIP_CP_KERNEL_HDR=1 \
          OUT_DIR=/home/runner/out \
          LTO=thin \
          BUILD_CONFIG=common/build.config.gki.aarch64 \
          CC="$cc" \
          CXX="$cxx" \
          HOSTCC="$hostcc" \
          HOSTCXX="$hostcxx" \
          LD="$ld" \
          HOSTLD="$hostld" \
          build/build.sh -j"$(nproc)"
        else
          tools/bazel run \
            --config=fast \
            --config=stamp \
            --disk_cache=/home/runner/.cache/bazel \
            //common:kernel_aarch64_dist \
            -- --dist_dir=/home/runner/out
        fi

    - name: Gather normal Image
      shell: bash
      working-directory: ${{ github.workspace }}
      run: |
        set -euo pipefail

        if [ -f /home/runner/out/dist/Image ]; then
          image_path=/home/runner/out/dist/Image
        elif [ -f /home/runner/out/Image ]; then
          image_path=/home/runner/out/Image
        else
          echo "ERROR: compiled Image was not found." >&2
          exit 1
        fi

        cp "$image_path" AnyKernel3/Image

        echo "Normal Image: $image_path"
        echo "Embedded Linux version:"
        strings "$image_path" | grep -m1 '^Linux version ' || true
