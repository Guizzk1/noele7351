name: Setup SUSFS
description: Clone and apply SUSFS for Android 12 GKI 5.10

inputs:
  susfs_commit:
    description: SUSFS commit hash (empty = latest branch HEAD)
    required: false
    default: ""
  version:
    description: Kernel config version
    required: true
  android_version:
    description: Android version
    required: true
  kernel_version:
    description: Kernel version
    required: true
  os_patch_level:
    description: OS patch level
    required: true
  sublevel:
    description: Real kernel sublevel
    required: true

runs:
  using: composite
  steps:
    - name: Clone SUSFS
      shell: bash
      working-directory: ${{ github.workspace }}
      run: |
        set -euo pipefail

        susfs_repo="https://gitlab.com/simonpunk/susfs4ksu.git"
        susfs_branch="gki-android12-5.10"
        requested_commit="${{ inputs.susfs_commit }}"

        if [ "${{ inputs.version }}" != "android12-5.10" ]; then
          echo "ERROR: this workflow supports only android12-5.10." >&2
          exit 1
        fi

        rm -rf susfs4ksu
        git clone --branch "$susfs_branch" --single-branch "$susfs_repo" susfs4ksu

        if [ -n "$requested_commit" ]; then
          if ! git -C susfs4ksu checkout --detach "$requested_commit"; then
            git -C susfs4ksu fetch --depth=1 origin "$requested_commit"
            git -C susfs4ksu checkout --detach FETCH_HEAD
          fi
        else
          git -C susfs4ksu checkout --detach "origin/$susfs_branch"
        fi

        susfs_commit="$(git -C susfs4ksu rev-parse HEAD)"
        susfs_version="$(
          awk -F'"' '/^#define[[:space:]]+SUSFS_VERSION[[:space:]]+/ {print $2; exit}' \
            susfs4ksu/kernel_patches/include/linux/susfs.h
        )"

        [ -n "$susfs_version" ] || {
          echo "ERROR: unable to read SUSFS_VERSION." >&2
          exit 1
        }

        echo "SUSFS_BRANCH=$susfs_branch" >> "$GITHUB_ENV"
        echo "SUSFS_COMMIT=$susfs_commit" >> "$GITHUB_ENV"
        echo "SUSFS_VERSION=$susfs_version" >> "$GITHUB_ENV"

        echo "SUSFS repository: $susfs_repo"
        echo "SUSFS branch:     $susfs_branch"
        echo "SUSFS commit:     $susfs_commit"
        echo "SUSFS version:    $susfs_version"

    - name: Enable SUSFS configs
      uses: ./.github/actions/set-kernel-config
      with:
        config_list: |
          CONFIG_KSU_SUSFS=y
          CONFIG_KSU_SUSFS_SUS_PATH=y
          CONFIG_KSU_SUSFS_SUS_MOUNT=y
          CONFIG_KSU_SUSFS_SUS_KSTAT=y
          CONFIG_KSU_SUSFS_SPOOF_UNAME=y
          CONFIG_KSU_SUSFS_ENABLE_LOG=y
          CONFIG_KSU_SUSFS_HIDE_KSU_SUSFS_SYMBOLS=y
          CONFIG_KSU_SUSFS_SPOOF_CMDLINE_OR_BOOTCONFIG=y
          CONFIG_KSU_SUSFS_OPEN_REDIRECT=y
          CONFIG_KSU_SUSFS_SUS_MAP=y

    - name: Install SUSFS source files
      shell: bash
      working-directory: ${{ github.workspace }}/kernel/common
      run: |
        set -euo pipefail
        cp "${{ github.workspace }}/susfs4ksu/kernel_patches/fs/"* fs/
        cp "${{ github.workspace }}/susfs4ksu/kernel_patches/include/linux/"* include/linux/
        cp \
          "${{ github.workspace }}/susfs4ksu/kernel_patches/50_add_susfs_in_gki-android12-5.10.patch" \
          50_add_susfs_in_gki-android12-5.10.patch

    - name: Apply SUSFS kernel patch
      shell: bash
      working-directory: ${{ github.workspace }}/kernel/common
      run: |
        set -euo pipefail
        patch --batch --forward -p1 < 50_add_susfs_in_gki-android12-5.10.patch
